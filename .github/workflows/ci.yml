name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check bimdata_read tests
      - run: ruff format --check bimdata_read tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # bim-core n'est pas sur PyPI : préinstaller le tag Git avant le package.
      - run: pip install "git+https://github.com/Slimouzi/bim-core.git@bim-core-v0.1.1"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest tests -q

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    # bimdata-read est installé par tag par les CI/release de 7 dépôts : un tag
    # cassé casse les pipelines aval. On ne construit qu'après lint + tests verts.
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build --sdist --wheel
      - run: twine check dist/*
